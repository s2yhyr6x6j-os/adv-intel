      const [inputMode, setInputMode] = useState("text");
      const [imageData, setImageData] = useState(null);
      const [imagePreview, setImagePreview] = useState(null);
      const [dragOver, setDragOver] = useState(false);
      const [driveToken, setDriveToken] = useState(null);
      const [driveStatus, setDriveStatus] = useState(null);
      const [driveLink, setDriveLink] = useState(null);
      const [showDriveModal, setShowDriveModal] = useState(false);
      const [clientGoogleId, setClientGoogleId] = useState("");
      const fileInputRef = useRef();
      const rawBytesRef = useRef(null);

      useEffect(() => {
        const hash = window.location.hash;
        if (hash.includes("access_token")) {
          const params = new URLSearchParams(hash.replace("#", "?"));
          const token = params.get("access_token");
          if (token) { setDriveToken(token); window.history.replaceState({}, "", window.location.pathname); }
        }
      }, []);

      const connectDrive = () => {
        if (!clientGoogleId.trim()) { alert("Please enter your Google Client ID."); return; }
        const p = new URLSearchParams({ client_id: clientGoogleId.trim(), redirect_uri: window.location.origin, response_type: "token", scope: "https://www.googleapis.com/auth/drive.file", prompt: "consent" });
        window.location.href = "https://accounts.google.com/o/oauth2/v2/auth?" + p.toString();
      };

      const getOrCreateFolder = async (token, name, parentId) => {
        const q = parentId
          ? "name='" + name + "' and mimeType='application/vnd.google-apps.folder' and '" + parentId + "' in parents and trashed=false"
          : "name='" + name + "' and mimeType='application/vnd.google-apps.folder' and trashed=false";
        const r = await fetch("https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent(q) + "&fields=files(id)", { headers: { Authorization: "Bearer " + token } });
        const d = await r.json();
        if (d.files && d.files.length > 0) return d.files[0].id;
        const cr = await fetch("https://www.googleapis.com/drive/v3/files", {
          method: "POST",
          headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
          body: JSON.stringify({ name: name, mimeType: "application/vnd.google-apps.folder", ...(parentId ? { parents: [parentId] } : {}) })
        });
        return (await cr.json()).id;
      };

      const uploadToDrive = async (token, fileName, fileData, mimeType, folderId) => {
        const form = new FormData();
        form.append("metadata", new Blob([JSON.stringify({ name: fileName, parents: [folderId] })], { type: "application/json" }));
        form.append("file", new Blob([fileData], { type: mimeType }));
        const r = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
          method: "POST", headers: { Authorization: "Bearer " + token }, body: form
        });
        return await r.json();
      };

      const archiveToDrive = async (parsed, imageInfo) => {
        if (!driveToken) return;
        setDriveStatus("saving");
        try {
          const clientName = parsed.clientName || "UnknownClient";
          const date = parsed.meetingDate || new Date().toISOString().split("T")[0];
          const fileName = date + "_" + clientName.split(" ").join("_") + "_MeetingNotes";
          const rootId = await getOrCreateFolder(driveToken, "Advisor Intelligence Meeting Notes", null);
          const clientFolderId = await getOrCreateFolder(driveToken, clientName, rootId);
          let uploaded;
          if (imageInfo) {
            const ext = imageInfo.type.includes("png") ? "png" : "jpg";
            uploaded = await uploadToDrive(driveToken, fileName + "." + ext, imageInfo.bytes, imageInfo.type, clientFolderId);
          } else {
            const bytes = new TextEncoder().encode("MEETING NOTES " + date + " Client: " + clientName + " " + notes);
            uploaded = await uploadToDrive(driveToken, fileName + ".txt", bytes, "text/plain", clientFolderId);
          }
          if (uploaded.id) { setDriveStatus("saved"); setDriveLink("https://drive.google.com/file/d/" + uploaded.id + "/view"); }
          else setDriveStatus("error");
        } catch(e) { console.error(e); setDriveStatus("error"); }
      };

      const handleImageFile = (file) => {
        if (!file || !file.type.startsWith("image/")) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          setImageData({ base64: e.target.result.split(",")[1], mediaType: file.type });
          setImagePreview(e.target.result);
        };
        reader.readAsDataURL(file);
        const raw = new FileReader();
        raw.onload = (e) => { rawBytesRef.current = { bytes: e.target.result, type: file.type }; };
        raw.readAsArrayBuffer(file);
      };

      const processNotes = async () => {
        if (inputMode === "text" && !notes.trim()) return;
        if (inputMode === "image" && !imageData) return;
        setLoading(true);
        setError(null);
        setResult(null);
        setDriveStatus(null);
        setDriveLink(null);
        try {
          const messageContent = inputMode === "image"
            ? [{ type: "image", source: { type: "base64", media_type: imageData.mediaType, data: imageData.base64 } }, { type: "text", text: "These are handwritten meeting notes. Process into the required JSON format." }]
            : "Here are my meeting notes: " + notes;

          const resp = await fetch("/api/claude", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1200, system: SYSTEM_PROMPT, messages: [{ role: "user", content: messageContent }] })
          });

          const data = await resp.json();
          if (data.error) { setError("API Error: " + data.error.message); return; }
          const textBlock = (data.content || []).find((b) => b.type === "text");
          if (!textBlock) { setError("No response received. Please try again."); return; }
          let clean = textBlock.text.trim();
          const firstBrace = clean.indexOf("{");
          const lastBrace = clean.lastIndexOf("}");
          if (firstBrace !== -1 && lastBrace !== -1) { clean = clean.substring(firstBrace, lastBrace + 1); }
          const parsed = JSON.parse(clean);
          setResult(parsed);
          setActiveTab("letter");
          if (driveToken) await archiveToDrive(parsed, inputMode === "image" ? rawBytesRef.current : null);
        } catch(e) {
          setError("Error: " + e.message);
        } finally {
          setLoading(false);
        }
      };

      const copy = (text, key) => {
        navigator.clipboard.writeText(text);
        setCopied(key);
        setTimeout(() => setCopied(null), 2000);
      };

      const canSubmit = inputMode === "text" ? notes.trim().length > 0 : !!imageData;

      const tabs = [
        { key: "letter", label: "Client Letter", icon: "fa-envelope" },
        { key: "crm", label: "CRM Notes", icon: "fa-database" },
        { key: "actions", label: "Action Items", icon: "fa-list-check" },
        { key: "compliance", label: "Compliance", icon: "fa-shield-halved" }
      ];

      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #f0f4ff 0%, #f0f2f5 100%)" }}>

          {/* Header */}
          <div style={{ background: WHITE, borderBottom: "1px solid " + GRAY_200, padding: "0 32px", display: "flex", alignItems: "center", justifyContent: "space-between", height: "108px", boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>
            <img src={LOGO_SRC} alt="Advisor Intelligence" style={{ height: "6em", objectFit: "contain" }} />
            /*<span style={{ fontSize: "11px", fontWeight: "600", color: BLUE, background: BLUE_LIGHT, padding: "4px 10px", borderRadius: "20px", letterSpacing: "0.05em" }}>PROTOTYPE</span>*/
          </div>

          <div style={{ maxWidth: "860px", margin: "0 auto", padding: "32px 24px" }}>

            {/* Page title */}
            <div style={{ marginBottom: "24px" }}>
              <h1 style={{ fontSize: "22px", fontWeight: "700", color: GRAY_800, marginBottom: "4px" }}>Meeting Notes</h1>
              <p style={{ fontSize: "14px", color: GRAY_400 }}>Paste your notes or upload a photo — AI generates your documents instantly</p>
            </div>

            {/* Input Card */}
            <div style={{ ...card, padding: "24px", marginBottom: "20px" }}>

              {/* Mode toggle */}
              <div style={{ display: "flex", gap: "8px", marginBottom: "20px" }}>
                {[{ key: "text", icon: "fa-pen-to-square", label: "Typed Notes" }, { key: "image", icon: "fa-camera", label: "Handwritten Photo" }].map((m) => (
                  <button key={m.key} onClick={() => setInputMode(m.key)} style={{ padding: "8px 18px", fontSize: "13px", fontWeight: "500", cursor: "pointer", fontFamily: "Inter, sans-serif", background: inputMode === m.key ? BLUE : GRAY_100, color: inputMode === m.key ? WHITE : GRAY_600, border: "none", borderRadius: "8px", transition: "all 0.15s", display: "flex", alignItems: "center", gap: "7px" }}>
                    <i className={"fa-solid " + m.icon} style={{ fontSize: "12px" }} /> {m.label}
                  </button>
                ))}
                <button onClick={() => setNotes(sampleNotes)} style={{ marginLeft: "auto", padding: "8px 14px", fontSize: "12px", fontWeight: "500", cursor: "pointer", fontFamily: "Inter, sans-serif", background: "transparent", color: GRAY_400, border: "1px solid " + GRAY_200, borderRadius: "8px", display: "flex", alignItems: "center", gap: "6px", transition: "all 0.15s" }}>
                  <i className="fa-solid fa-wand-magic-sparkles" style={{ fontSize: "11px" }} /> Sample
                </button>
              </div>

              {inputMode === "text" && (
                <textarea value={notes} onChange={(e) => setNotes(e.target.value)}
                  placeholder="e.g. Met with the Johnsons today, reviewed their portfolio allocation, discussed upcoming retirement timeline..."
                  style={{ width: "100%", minHeight: "160px", background: GRAY_50, border: "1.5px solid " + GRAY_200, borderRadius: "10px", padding: "14px 16px", color: GRAY_800, fontSize: "14px", lineHeight: "1.7", fontFamily: "Inter, sans-serif", resize: "vertical", transition: "border-color 0.2s, box-shadow 0.2s" }}
                />
              )}

              {inputMode === "image" && (
                <div>
                  {!imagePreview ? (
                    <div onClick={() => fileInputRef.current.click()}
                      onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                      onDragLeave={() => setDragOver(false)}
                      onDrop={(e) => { e.preventDefault(); setDragOver(false); handleImageFile(e.dataTransfer.files[0]); }}
                      style={{ border: "2px dashed " + (dragOver ? BLUE : GRAY_200), borderRadius: "10px", padding: "40px 24px", textAlign: "center", cursor: "pointer", background: dragOver ? BLUE_LIGHT : GRAY_50, transition: "all 0.2s" }}>
                      <div style={{ width: "48px", height: "48px", background: BLUE_LIGHT, borderRadius: "12px", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 12px" }}>
                        <i className="fa-solid fa-camera" style={{ fontSize: "20px", color: BLUE }} />
                      </div>
                      <div style={{ fontSize: "15px", fontWeight: "600", color: GRAY_800, marginBottom: "4px" }}>Upload handwritten notes</div>
                      <div style={{ fontSize: "13px", color: GRAY_400 }}>Click to browse or drag and drop — JPG, PNG</div>
                      <input ref={fileInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => handleImageFile(e.target.files[0])} />
                    </div>
                  ) : (
                    <div style={{ position: "relative" }}>
                      <img src={imagePreview} alt="Notes" style={{ width: "100%", maxHeight: "260px", objectFit: "contain", borderRadius: "10px", border: "1px solid " + GRAY_200, background: GRAY_50 }} />
                      <button onClick={() => { setImageData(null); setImagePreview(null); }} style={{ position: "absolute", top: "10px", right: "10px", background: GRAY_800, border: "none", color: WHITE, borderRadius: "8px", padding: "5px 12px", fontSize: "12px", cursor: "pointer", fontFamily: "Inter, sans-serif", fontWeight: "500", display: "flex", alignItems: "center", gap: "5px" }}>
                        <i className="fa-solid fa-xmark" /> Remove
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* Footer row */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: "16px", gap: "12px" }}>
                <button onClick={() => setShowDriveModal(true)} style={{ fontSize: "13px", fontWeight: "500", color: driveToken ? SUCCESS : GRAY_400, background: "transparent", border: "1px solid " + (driveToken ? SUCCESS_BORDER : GRAY_200), borderRadius: "8px", padding: "7px 14px", cursor: "pointer", fontFamily: "Inter, sans-serif", display: "flex", alignItems: "center", gap: "6px", transition: "all 0.15s" }}>
                  <i className={"fa-brands fa-google-drive"} style={{ fontSize: "13px" }} />
                  {driveToken ? "Drive Connected" : "Connect Drive"}
                </button>

                <button onClick={processNotes} disabled={loading || !canSubmit}
                  style={{ background: loading || !canSubmit ? GRAY_200 : "linear-gradient(135deg, " + BLUE + " 0%, " + BLUE_MID + " 100%)", color: loading || !canSubmit ? GRAY_400 : WHITE, border: "none", borderRadius: "10px", padding: "11px 28px", fontSize: "14px", fontWeight: "600", cursor: loading || !canSubmit ? "not-allowed" : "pointer", fontFamily: "Inter, sans-serif", display: "flex", alignItems: "center", gap: "8px", boxShadow: loading || !canSubmit ? "none" : "0 4px 12px rgba(26,86,219,0.3)", transition: "all 0.2s" }}>
                  {loading ? <><i className="fa-solid fa-spinner fa-spin" /> Processing...</> : <><i className="fa-solid fa-bolt" /> Generate Documents</>}
                </button>
              </div>
            </div>

            {error && (
              <div style={{ background: ERROR_BG, border: "1px solid " + ERROR_BORDER, borderRadius: "12px", padding: "14px 18px", color: ERROR_TEXT, fontSize: "13px", marginBottom: "20px", display: "flex", gap: "10px", alignItems: "flex-start" }}>
                <i className="fa-solid fa-circle-exclamation" style={{ marginTop: "1px" }} /> {error}
              </div>
            )}

            {driveStatus && (
              <div style={{ background: driveStatus === "saved" ? SUCCESS_BG : driveStatus === "saving" ? BLUE_LIGHT : ERROR_BG, border: "1px solid " + (driveStatus === "saved" ? SUCCESS_BORDER : driveStatus === "saving" ? "#bfdbfe" : ERROR_BORDER), borderRadius: "12px", padding: "12px 18px", fontSize: "13px", marginBottom: "20px", display: "flex", alignItems: "center", gap: "8px", color: driveStatus === "saved" ? SUCCESS : driveStatus === "saving" ? BLUE : ERROR_TEXT }}>
                {driveStatus === "saving" && <><i className="fa-solid fa-spinner fa-spin" /> Archiving to Google Drive...</>}
                {driveStatus === "saved" && <><i className="fa-solid fa-circle-check" /> Archived to Drive — <a href={driveLink} target="_blank" rel="noreferrer" style={{ color: BLUE, fontWeight: "600", textDecoration: "none" }}>View file</a></>}
                {driveStatus === "error" && <><i className="fa-solid fa-triangle-exclamation" /> Could not save to Google Drive</>}
              </div>
            )}

            {/* Results Card */}
            {result && (
              <div className="fade-in" style={{ ...card }}>

                {/* Client info bar */}
                <div style={{ padding: "16px 24px", borderBottom: "1px solid " + GRAY_200, display: "flex", gap: "16px", alignItems: "center", flexWrap: "wrap" }}>
                  {result.clientName && (
                    <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                      <div style={{ width: "32px", height: "32px", background: BLUE_LIGHT, borderRadius: "8px", display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <i className="fa-solid fa-user" style={{ fontSize: "13px", color: BLUE }} />
                      </div>
                      <span style={{ fontSize: "14px", fontWeight: "600", color: GRAY_800 }}>{result.clientName}</span>
                    </div>
                  )}
                  {result.meetingDate && (
                    <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                      <i className="fa-solid fa-calendar-days" style={{ fontSize: "12px", color: GRAY_400 }} />
                      <span style={{ fontSize: "13px", color: GRAY_600 }}>{result.meetingDate}</span>
                    </div>
                  )}
                  {driveStatus === "saved" && (
                    <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: "6px", fontSize: "12px", color: SUCCESS, fontWeight: "500" }}>
                      <i className="fa-brands fa-google-drive" /> Archived
                    </div>
                  )}
                </div>

                {/* Tabs */}
                <div style={{ display: "flex", padding: "0 24px", borderBottom: "1px solid " + GRAY_200, overflowX: "auto", gap: "4px" }}>
                  {tabs.map((tab) => (
                    <button key={tab.key} onClick={() => setActiveTab(tab.key)}
                      style={{ padding: "14px 16px", fontSize: "13px", fontWeight: activeTab === tab.key ? "600" : "500", background: "transparent", border: "none", borderBottom: activeTab === tab.key ? "2px solid " + BLUE : "2px solid transparent", color: activeTab === tab.key ? BLUE : GRAY_400, cursor: "pointer", fontFamily: "Inter, sans-serif", display: "flex", alignItems: "center", gap: "7px", whiteSpace: "nowrap", transition: "all 0.15s", marginBottom: "-1px" }}>
                      <i className={"fa-solid " + tab.icon} style={{ fontSize: "12px" }} /> {tab.label}
                      {tab.key === "compliance" && result.complianceFlags && result.complianceFlags.length > 0 && (
                        <span style={{ background: "#fef2f2", color: "#dc2626", fontSize: "10px", fontWeight: "700", padding: "1px 7px", borderRadius: "20px" }}>{result.complianceFlags.length}</span>
                      )}
                    </button>
                  ))}
                </div>

                {/* Tab content */}
                <div style={{ padding: "24px" }}>

                  {activeTab === "letter" && (
                    <div>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
                        <div style={{ fontSize: "12px", fontWeight: "600", color: GRAY_400, letterSpacing: "0.08em", textTransform: "uppercase" }}>Client Follow-Up Letter</div>
                        <button onClick={() => copy(result.clientLetter, "letter")} style={{ fontSize: "12px", fontWeight: "500", color: copied === "letter" ? SUCCESS : BLUE, background: copied === "letter" ? SUCCESS_BG : BLUE_LIGHT, border: "none", borderRadius: "7px", padding: "5px 12px", cursor: "pointer", fontFamily: "Inter, sans-serif", display: "flex", alignItems: "center", gap: "5px" }}>
                          <i className={"fa-solid " + (copied === "letter" ? "fa-check" : "fa-copy")} style={{ fontSize: "11px" }} /> {copied === "letter" ? "Copied!" : "Copy"}
                        </button>
                      </div>
                      <div style={{ fontSize: "14px", lineHeight: "1.9", color: GRAY_600, whiteSpace: "pre-wrap", borderLeft: "3px solid " + BLUE_MID, paddingLeft: "18px" }}>{result.clientLetter}</div>
                    </div>
                  )}

                  {activeTab === "crm" && (
                    <div>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
                        <div style={{ fontSize: "12px", fontWeight: "600", color: GRAY_400, letterSpacing: "0.08em", textTransform: "uppercase" }}>Internal CRM Notes</div>
                        <button onClick={() => copy(result.crmNotes, "crm")} style={{ fontSize: "12px", fontWeight: "500", color: copied === "crm" ? SUCCESS : BLUE, background: copied === "crm" ? SUCCESS_BG : BLUE_LIGHT, border: "none", borderRadius: "7px", padding: "5px 12px", cursor: "pointer", fontFamily: "Inter, sans-serif", display: "flex", alignItems: "center", gap: "5px" }}>
                          <i className={"fa-solid " + (copied === "crm" ? "fa-check" : "fa-copy")} style={{ fontSize: "11px" }} /> {copied === "crm" ? "Copied!" : "Copy"}
                        </button>
                      </div>
                      <div style={{ fontSize: "14px", lineHeight: "1.8", color: GRAY_600, whiteSpace: "pre-wrap", background: GRAY_50, borderRadius: "10px", padding: "16px" }}>{result.crmNotes}</div>
                    </div>
                  )}

                  {activeTab === "actions" && (
                    <div>
                      <div style={{ fontSize: "12px", fontWeight: "600", color: GRAY_400, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "16px" }}>Action Items</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                        {(result.actionItems || []).map((item, i) => {
                          const pColor = item.priority === "High" ? "#dc2626" : item.priority === "Medium" ? BLUE : SUCCESS;
                          const pBg = item.priority === "High" ? "#fef2f2" : item.priority === "Medium" ? BLUE_LIGHT : SUCCESS_BG;
                          return (
                            <div key={i} style={{ display: "flex", gap: "14px", background: GRAY_50, borderRadius: "10px", padding: "14px 16px", border: "1px solid " + GRAY_200 }}>
                              <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: pColor, marginTop: "6px", flexShrink: 0 }} />
                              <div style={{ flex: 1 }}>
                                <div style={{ fontSize: "14px", color: GRAY_800, marginBottom: "8px", fontWeight: "500" }}>{item.task}</div>
                                <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
                                  <Badge color={GRAY_600} bg={GRAY_200}><i className="fa-solid fa-user" style={{ marginRight: "4px", fontSize: "10px" }} />{item.owner}</Badge>
                                  <Badge color={pColor} bg={pBg}>{item.priority}</Badge>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {activeTab === "compliance" && (
                    <div>
                      <div style={{ fontSize: "12px", fontWeight: "600", color: GRAY_400, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "16px" }}>Compliance Review Flags</div>
                      {(!result.complianceFlags || result.complianceFlags.length === 0) ? (
                        <div style={{ background: SUCCESS_BG, border: "1px solid " + SUCCESS_BORDER, borderRadius: "10px", padding: "16px", fontSize: "14px", color: SUCCESS, display: "flex", alignItems: "center", gap: "10px" }}>
                          <i className="fa-solid fa-circle-check" /> No compliance flags detected in these notes
                        </div>
                      ) : (
                        <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                          {result.complianceFlags.map((flag, i) => (
                            <div key={i} style={{ background: WARN_BG, border: "1px solid " + WARN_BORDER, borderRadius: "10px", padding: "14px 16px", fontSize: "14px", color: WARN_TEXT, display: "flex", gap: "10px", alignItems: "flex-start" }}>
                              <i className="fa-solid fa-triangle-exclamation" style={{ marginTop: "2px", flexShrink: 0 }} /> {flag}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}

                </div>
              </div>
            )}
          </div>

          {/* Drive Modal */}
          {showDriveModal && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: "24px" }} onClick={() => setShowDriveModal(false)}>
              <div style={{ ...card, padding: "28px", maxWidth: "480px", width: "100%" }} onClick={(e) => e.stopPropagation()}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
                  <div style={{ fontSize: "16px", fontWeight: "700", color: GRAY_800, display: "flex", alignItems: "center", gap: "10px" }}>
                    <div style={{ width: "36px", height: "36px", background: BLUE_LIGHT, borderRadius: "10px", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <i className="fa-brands fa-google-drive" style={{ color: BLUE, fontSize: "16px" }} />
                    </div>
                    Connect Google Drive
                  </div>
                  <button onClick={() => setShowDriveModal(false)} style={{ background: "none", border: "none", cursor: "pointer", color: GRAY_400, fontSize: "18px", padding: "4px" }}>
                    <i className="fa-solid fa-xmark" />
                  </button>
                </div>

                {driveToken ? (
                  <div style={{ background: SUCCESS_BG, border: "1px solid " + SUCCESS_BORDER, borderRadius: "10px", padding: "14px 16px", fontSize: "14px", color: SUCCESS, display: "flex", alignItems: "center", gap: "8px" }}>
                    <i className="fa-solid fa-circle-check" /> Google Drive is connected. Notes will auto-archive after each session.
                  </div>
                ) : (
                  <div>
                    <p style={{ fontSize: "13px", color: GRAY_600, marginBottom: "16px", lineHeight: "1.6" }}>
                      Auto-archive meeting notes to Google Drive after each session. Notes are saved under <strong>Advisor Intelligence Meeting Notes / [Client Name]</strong> with date-stamped filenames.
                    </p>
                    <p style={{ fontSize: "12px", color: GRAY_400, marginBottom: "12px" }}>
                      Requires a Google OAuth Client ID from <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noreferrer" style={{ color: BLUE }}>Google Cloud Console</a>.
                    </p>
                    <input value={clientGoogleId} onChange={(e) => setClientGoogleId(e.target.value)} placeholder="Paste your Google OAuth Client ID..." style={{ width: "100%", background: GRAY_50, border: "1.5px solid " + GRAY_200, borderRadius: "8px", padding: "10px 14px", fontSize: "13px", fontFamily: "monospace", marginBottom: "12px", transition: "border-color 0.2s, box-shadow 0.2s" }} />
                    <button onClick={connectDrive} style={{ width: "100%", background: "linear-gradient(135deg, " + BLUE + " 0%, " + BLUE_MID + " 100%)", color: WHITE, border: "none", borderRadius: "10px", padding: "11px", fontSize: "14px", fontWeight: "600", cursor: "pointer", fontFamily: "Inter, sans-serif", display: "flex", alignItems: "center", justifyContent: "center", gap: "8px", boxShadow: "0 4px 12px rgba(26,86,219,0.3)" }}>
                      <i className="fa-brands fa-google" /> Authorize with Google
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
