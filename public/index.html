    const SYSTEM_PROMPT = `You are an expert assistant for Registered Investment Advisors (RIAs). You help advisors convert rough post-meeting notes into professional, compliance-aware client communications and internal documentation.

}

    const sampleNotes = `Met with Jim and Carol Hendricks, 45 mins. They are worried about recent market volatility and asked if they should move to cash. Reminded them of their 15-year horizon and IPS. Reviewed Q3 performance - portfolio down 4.2% vs benchmark down 5.1%. They seemed relieved.

    function App() {
      const [notes, setNotes] = useState("");
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [activeTab, setActiveTab] = useState("letter");
      const [copied, setCopied] = useState(null);
      const [inputMode, setInputMode] = useState("text");
      const [imageData, setImageData] = useState(null);
      const [imagePreview, setImagePreview] = useState(null);
      const [dragOver, setDragOver] = useState(false);
      const fileInputRef = useRef();

      const handleImageFile = (file) => {
        if (!file || !file.type.startsWith("image/")) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          setImageData({ base64: e.target.result.split(",")[1], mediaType: file.type });
          setImagePreview(e.target.result);
        };
        reader.readAsDataURL(file);
      };

      const processNotes = async () => {
        if (inputMode === "text" && !notes.trim()) return;
        if (inputMode === "image" && !imageData) return;
        setLoading(true); setError(null); setResult(null);
        try {
          const messageContent = inputMode === "image"
            ? [
                { type: "image", source: { type: "base64", media_type: imageData.mediaType, data: imageData.base64 } },
                { type: "text", text: "These are handwritten meeting notes. Process into the required JSON format." }
              ]
            : "Here are my meeting notes:\n\n" + notes;

          const resp = await fetch("/api/claude", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1200,
              system: SYSTEM_PROMPT,
              messages: [{ role: "user", content: messageContent }]
            })
          });

          const data = await resp.json();
          if (data.error) { setError("API Error: " + data.error.message); return; }
          const text = (data.content || []).find(b => b.type === "text");
          if (!text) { setError("No response received. Please try again."); return; }
          const clean = text.text.replace(/```json[\r\n]?/g, "").replace(/```[\r\n]?/g, "").trim();
?/g, "").replace(/```
?/g, "").trim();
          const parsed = JSON.parse(clean);
          setResult(parsed);
          setActiveTab("letter");
        } catch (e) {
          setError("Error: " + e.message);
        } finally {
          setLoading(false);
        }

              </div>
            </div>
            <div style={{ fontSize: "10px", color: C.mid, background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.2)", padding: "5px 10px", borderRadius: "4px", letterSpacing: "0.1em" }}>PROTOTYPE</div>
          </div>

          <div style={{ maxWidth: "820px", margin: "0 auto", padding: "32px" }}>

            <div style={{ marginBottom: "18px" }}>
              <div style={{ fontSize: "24px", fontWeight: "600", color: C.navy, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: "4px" }}>Meeting Notes</div>
              <div style={{ fontSize: "13px", color: C.mid, fontFamily: "Georgia, serif" }}>Type, paste, or photograph your notes — we handle the rest</div>
            </div>

            {/* Mode Toggle */}
            <div style={{ display: "flex", marginBottom: "18px", border: "1px solid " + C.borderGray, borderRadius: "4px", overflow: "hidden", width: "fit-content" }}>
              {[{ key: "text", icon: "fa-pen", label: "Typed / Pasted Notes" }, { key: "image", icon: "fa-camera", label: "Photo of Handwritten Notes" }].map((m, i) => (
                <button key={m.key} onClick={() => setInputMode(m.key)} style={{ padding: "9px 20px", fontSize: "13px", cursor: "pointer", fontFamily: "Oswald, sans-serif", letterSpacing: "0.05em", background: inputMode === m.key ? C.navy : C.white, color: inputMode === m.key ? C.white : C.mid, border: "none", borderLeft: i > 0 ? "1px solid " + C.borderGray : "none", transition: "all 0.2s", display: "flex", alignItems: "center", gap: "8px" }}>
                  <i className={"fa-solid " + m.icon} /> {m.label}
                </button>
              ))}
            </div>

            {/* Text Input */}
            {inputMode === "text" && (
              <div style={{ marginBottom: "14px" }}>
                <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: "8px" }}>
                  <button onClick={() => setNotes(sampleNotes)} style={{ fontSize: "12px", color: C.navy, background: "transparent", border: "1px solid " + C.navy, borderRadius: "4px", padding: "5px 12px", cursor: "pointer", fontFamily: "Oswald, sans-serif", letterSpacing: "0.05em", display: "flex", alignItems: "center", gap: "6px" }}>
                    <i className="fa-solid fa-wand-magic-sparkles" /> Load Sample Notes
                  </button>
                </div>
                <textarea value={notes} onChange={e => setNotes(e.target.value)}
                  placeholder="e.g. Met with the Johnsons today, 30 mins. Reviewed portfolio, client asked about Roth conversion..."
                  onFocus={e => e.target.style.borderColor = C.navy}
                  onBlur={e => e.target.style.borderColor = C.borderGray}
                  style={{ width: "100%", minHeight: "175px", background: C.lightGray, border: "1px solid " + C.borderGray, borderRadius: "4px", padding: "14px", color: C.darkText, fontSize: "14px", lineHeight: "1.7", fontFamily: "Georgia, serif", resize: "vertical", outline: "none", transition: "border-color 0.2s" }}
                />
              </div>
            )}

            {/* Image Upload */}
            {inputMode === "image" && (
              <div style={{ marginBottom: "14px" }}>
                {!imagePreview ? (
                  <div onClick={() => fileInputRef.current.click()}
                    onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                    onDragLeave={() => setDragOver(false)}
                    onDrop={e => { e.preventDefault(); setDragOver(false); handleImageFile(e.dataTransfer.files[0]); }}
                    style={{ border: "2px dashed " + (dragOver ? C.navy : C.borderGray), borderRadius: "4px", padding: "48px 24px", textAlign: "center", cursor: "pointer", background: dragOver ? "#edf2f7" : C.lightGray, transition: "all 0.2s" }}>
                    <i className="fa-solid fa-camera" style={{ fontSize: "34px", color: dragOver ? C.navy : C.mid, marginBottom: "12px", display: "block" }} />
                    <div style={{ fontSize: "15px", color: C.navy, fontWeight: "500", letterSpacing: "0.04em", textTransform: "uppercase", marginBottom: "6px" }}>Upload Photo of Handwritten Notes</div>
                    <div style={{ fontSize: "13px", color: C.mid, fontFamily: "Georgia, serif" }}>Click to browse or drag and drop — JPG, PNG supported</div>
                    <input ref={fileInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={e => handleImageFile(e.target.files[0])} />
                  </div>
                ) : (
                  <div style={{ position: "relative" }}>
                    <img src={imagePreview} alt="Notes" style={{ width: "100%", maxHeight: "280px", objectFit: "contain", borderRadius: "4px", border: "1px solid " + C.borderGray, background: C.lightGray }} />
                    <button onClick={() => { setImageData(null); setImagePreview(null); }} style={{ position: "absolute", top: "10px", right: "10px", background: C.navy, border: "none", color: C.white, borderRadius: "4px", padding: "5px 10px", fontSize: "12px", cursor: "pointer", fontFamily: "Oswald, sans-serif", display: "flex", alignItems: "center", gap: "4px" }}>
                      <i className="fa-solid fa-xmark" /> Remove
                    </button>
                    <div style={{ marginTop: "8px", fontSize: "13px", color: C.success, display: "flex", alignItems: "center", gap: "6px", fontFamily: "Georgia, serif" }}>
                      <i className="fa-solid fa-circle-check" /> Image ready — click Generate to process
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Generate Button */}
            <button onClick={processNotes} disabled={loading || !canSubmit}
              style={{ marginBottom: "24px", background: loading || !canSubmit ? C.mid : C.navy, color: C.white, border: "none", borderRadius: "4px", padding: "12px 32px", fontSize: "15px", fontWeight: "600", cursor: loading || !canSubmit ? "not-allowed" : "pointer", letterSpacing: "0.1em", textTransform: "uppercase", fontFamily: "Oswald, sans-serif", display: "flex", alignItems: "center", gap: "10px" }}>
              {loading
                ? <><i className="fa-solid fa-spinner fa-spin" /> {inputMode === "image" ? "Reading Handwriting..." : "Processing..."}</>
                : <><i className="fa-solid fa-bolt" /> Generate Documents</>}
            </button>

            {error && (
              <div style={{ background: C.errorBg, border: "1px solid " + C.errorBorder, borderLeft: "4px solid " + C.errorText, borderRadius: "4px", padding: "12px 16px", color: C.errorText, fontSize: "13px", marginBottom: "20px", fontFamily: "Georgia, serif", display: "flex", gap: "8px", alignItems: "flex-start" }}>
                <i className="fa-solid fa-circle-exclamation" style={{ marginTop: "2px" }} /> {error}
              </div>
            )}

            {/* Results */}
            {result && (
              <div className="fade-in" style={{ background: C.white, border: "1px solid " + C.borderGray, borderRadius: "4px", boxShadow: "0 2px 16px rgba(1,63,110,0.09)" }}>

                {(result.clientName || result.meetingDate) && (
                  <div style={{ padding: "11px 22px", borderBottom: "1px solid " + C.borderGray, display: "flex", gap: "18px", alignItems: "center", background: "#edf2f7" }}>
                    {result.clientName && <span style={{ fontSize: "13px", color: C.navy, fontWeight: "600", letterSpacing: "0.05em", display: "flex", alignItems: "center", gap: "6px" }}><i className="fa-solid fa-user" /> {result.clientName}</span>}
                    {result.meetingDate && <span style={{ fontSize: "13px", color: C.mid, display: "flex", alignItems: "center", gap: "6px", fontFamily: "Georgia, serif" }}><i className="fa-solid fa-calendar" /> {result.meetingDate}</span>}
                  </div>
                )}

                <div style={{ display: "flex", borderBottom: "1px solid " + C.borderGray, overflowX: "auto" }}>
                  {tabs.map(tab => (
                    <button key={tab.key} onClick={() => setActiveTab(tab.key)}
                      style={{ padding: "12px 18px", fontSize: "12px", background: "transparent", border: "none", borderBottom: activeTab === tab.key ? "3px solid " + C.navy : "3px solid transparent", color: activeTab === tab.key ? C.navy : C.mid, cursor: "pointer", letterSpacing: "0.06em", textTransform: "uppercase", fontFamily: "Oswald, sans-serif", fontWeight: activeTab === tab.key ? "600" : "400", display: "flex", alignItems: "center", gap: "6px", whiteSpace: "nowrap" }}>
                      <i className={"fa-solid " + tab.icon} /> {tab.label}
                      {tab.key === "compliance" && result.complianceFlags && result.complianceFlags.length > 0 && (
                        <span style={{ background: C.navy, color: C.white, fontSize: "10px", padding: "1px 6px", borderRadius: "10px" }}>{result.complianceFlags.length}</span>
                      )}
                    </button>
                  ))}
                </div>

                <div style={{ padding: "22px" }}>

                  {activeTab === "letter" && (
                    <div>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "14px" }}>
                        <div style={{ fontSize: "11px", color: C.mid, letterSpacing: "0.1em", textTransform: "uppercase", display: "flex", alignItems: "center", gap: "6px" }}><i className="fa-solid fa-envelope" /> Client Follow-Up Letter</div>
                        <button onClick={() => copy(result.clientLetter, "letter")} style={{ fontSize: "12px", color: copied === "letter" ? C.success : C.navy, background: "transparent", border: "1px solid " + (copied === "letter" ? C.success : C.navy), borderRadius: "4px", padding: "4px 12px", cursor: "pointer", fontFamily: "Oswald, sans-serif", display: "flex", alignItems: "center", gap: "5px" }}>
                          <i className={"fa-solid " + (copied === "letter" ? "fa-check" : "fa-copy")} /> {copied === "letter" ? "Copied!" : "Copy"}
                        </button>
                      </div>
                      <div style={{ fontSize: "14px", lineHeight: "1.9", color: "#2a2a2a", whiteSpace: "pre-wrap", borderLeft: "4px solid " + C.navy, paddingLeft: "18px", fontFamily: "Georgia, serif" }}>{result.clientLetter}</div>
                    </div>
                  )}

                  {activeTab === "crm" && (
                    <div>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "14px" }}>
                        <div style={{ fontSize: "11px", color: C.mid, letterSpacing: "0.1em", textTransform: "uppercase", display: "flex", alignItems: "center", gap: "6px" }}><i className="fa-solid fa-database" /> Internal CRM Notes</div>
                        <button onClick={() => copy(result.crmNotes, "crm")} style={{ fontSize: "12px", color: copied === "crm" ? C.success : C.navy, background: "transparent", border: "1px solid " + (copied === "crm" ? C.success : C.navy), borderRadius: "4px", padding: "4px 12px", cursor: "pointer", fontFamily: "Oswald, sans-serif", display: "flex", alignItems: "center", gap: "5px" }}>
                          <i className={"fa-solid " + (copied === "crm" ? "fa-check" : "fa-copy")} /> {copied === "crm" ? "Copied!" : "Copy"}
                        </button>
                      </div>
                      <div style={{ fontSize: "14px", lineHeight: "1.8", color: "#2a2a2a", whiteSpace: "pre-wrap", background: C.lightGray, borderRadius: "4px", padding: "14px", fontFamily: "Georgia, serif" }}>{result.crmNotes}</div>
                    </div>
                  )}

                  {activeTab === "actions" && (
                    <div>
                      <div style={{ fontSize: "11px", color: C.mid, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "14px", display: "flex", alignItems: "center", gap: "6px" }}><i className="fa-solid fa-list-check" /> Action Items</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: "9px" }}>
                        {(result.actionItems || []).map((item, i) => (
                          <div key={i} style={{ display: "flex", gap: "12px", background: C.lightGray, borderRadius: "4px", padding: "12px 14px", border: "1px solid " + C.borderGray, borderLeft: "4px solid " + (item.priority === "High" ? "#c0392b" : item.priority === "Medium" ? C.navy : C.success) }}>
                            <i className={"fa-solid fa-circle-" + (item.priority === "High" ? "exclamation" : item.priority === "Medium" ? "minus" : "check")} style={{ color: item.priority === "High" ? "#c0392b" : item.priority === "Medium" ? C.navy : C.success, marginTop: "3px" }} />
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: "14px", color: C.darkText, marginBottom: "5px", fontFamily: "Georgia, serif" }}>{item.task}</div>
                              <div style={{ fontSize: "12px", color: C.mid, display: "flex", gap: "14px" }}>
                                <span style={{ display: "flex", alignItems: "center", gap: "4px" }}><i className="fa-solid fa-user" /> <span style={{ color: C.navy, fontWeight: "600" }}>{item.owner}</span></span>
                                <span style={{ display: "flex", alignItems: "center", gap: "4px" }}><i className="fa-solid fa-flag" /> <span style={{ color: item.priority === "High" ? "#c0392b" : item.priority === "Medium" ? C.navy : C.success, fontWeight: "600" }}>{item.priority}</span></span>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {activeTab === "compliance" && (
                    <div>
                      <div style={{ fontSize: "11px", color: C.mid, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "14px", display: "flex", alignItems: "center", gap: "6px" }}><i className="fa-solid fa-shield-halved" /> Compliance Review Flags</div>
                      {(!result.complianceFlags || result.complianceFlags.length === 0) ? (
                        <div style={{ fontSize: "14px", color: C.success, background: C.successBg, border: "1px solid " + C.successBorder, borderLeft: "4px solid " + C.success, borderRadius: "4px", padding: "12px 16px", display: "flex", alignItems: "center", gap: "8px", fontFamily: "Georgia, serif" }}>
                          <i className="fa-solid fa-circle-check" /> No compliance flags detected in these notes
                        </div>
                      ) : (
                        <div style={{ display: "flex", flexDirection: "column", gap: "9px" }}>
                          {result.complianceFlags.map((flag, i) => (
                            <div key={i} style={{ background: C.warnBg, border: "1px solid " + C.warnBorder, borderLeft: "4px solid " + C.warnText, borderRadius: "4px", padding: "12px 14px", fontSize: "14px", color: C.warnText, display: "flex", gap: "10px", fontFamily: "Georgia, serif" }}>
                              <i className="fa-solid fa-triangle-exclamation" style={{ marginTop: "2px" }} /> {flag}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}

                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
